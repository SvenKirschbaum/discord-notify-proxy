name: Release Native Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch:

concurrency:
  group: release-native-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: registry.gitlab.com/fallobst22/images/discord-notify-proxy

jobs:
  build-and-publish:
    name: Build and Publish Native Image
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1
        with:
          distribution: graalvm-community
          java-version: '25'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=main-${{ github.run_number }},enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Run native tests
        env:
          APP_DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN_SMOKETEST }}
        run: ./mvnw -B -PnativeTest test

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
          password: ${{ secrets.GITLAB_REGISTRY_PASSWORD }}

      - name: Publish native OCI image
        run: >-
          ./mvnw -B -Pnative spring-boot:build-image
          -Dspring-boot.build-image.publish=true
          -Dspring-boot.build-image.imageName=${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          -Dspring-boot.build-image.tags=${{ join(fromJSON(steps.meta.outputs.json).tags, ',') }}

      - name: Scan published image
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:main-${{ github.run_number }}
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
