name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Maven Test
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run test suite
        run: ./mvnw -B test

  image-smoke:
    name: Image Smoke Test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build native OCI image
        run: >-
          ./mvnw -B -Pnative spring-boot:build-image
          -Dspring-boot.build-image.imageName=discord-notify-proxy:ci-${{ github.sha }}

      - name: Smoke test built image
        env:
          APP_DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN_SMOKETEST }}
        run: ./.github/scripts/smoke-test-image.sh discord-notify-proxy:ci-${{ github.sha }}
